<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>headroom{% block title %}{% endblock %}</title>
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/vendor/marked.min.js"></script>
    <link rel="stylesheet" href="/static/vendor/highlight-github.min.css">
    <script src="/static/vendor/highlight.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        /* ─── Palette ──────────────────────────────────────────── */
        --bg: #f2f1ed; /* warm off-white page bg */
        --surface: #ffffff; /* elevated panels / cards  */
        --surface2: #edecea; /* secondary surface        */
        --border: #e0dfdb; /* subtle warm-gray border  */
        --text: #0a0a0a; /* near-black body text     */
        --text-muted: #8c8a85; /* warm gray secondary text */

        /* single accent — Weavy chartreuse */
        --accent: #ccff00;
        --accent-dark: #b8e800; /* hover / pressed          */
        --accent-fg: #0a0a0a; /* text rendered on accent  */

        /* semantic status colours                               */
        --green: #16a34a;
        --amber: #d97706;
        --red: #dc2626;

        /* ─── Type ─────────────────────────────────────────────── */
        --mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;

        /* ─── Shape ─────────────────────────────────────────────── */
        --radius: 2px; /* nearly-square, Weavy-influenced */
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, "Inter", BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        min-height: 100vh;
      }

      /* ── Header ─────────────────────────────────────────────────── */
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 28px;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      header h1 {
        font-size: 15px;
        font-weight: 800;
        font-family: var(--mono);
        letter-spacing: -0.03em;
        color: var(--text);
      }
      header h1 span {
        /* accent dot to the left of the logo */
        display: inline-block;
        width: 8px;
        height: 8px;
        background: var(--accent);
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
        position: relative;
        top: -1px;
      }
      header .model-badge {
        font-size: 11px;
        color: var(--text-muted);
        font-family: var(--mono);
        letter-spacing: 0.02em;
      }
      header .session-name {
        margin-left: auto;
        font-size: 11px;
        color: var(--text-muted);
        font-family: var(--mono);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      /* ── Layout grid ─────────────────────────────────────────────── */
      .layout {
        display: grid;
        grid-template-columns: 1fr 288px;
        grid-template-rows: auto 1fr;
        height: calc(100vh - 52px);
      }
      .budget-section {
        grid-column: 1 / -1;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 20px 28px;
      }
      .chat-section {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
      }
      .sidebar {
        background: var(--surface);
        border-left: 1px solid var(--border);
        overflow-y: auto;
        padding: 20px 16px;
      }

      /* ── Section labels ─────────────────────────────────────────── */
      .section-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        margin-bottom: 12px;
      }

      /* ── Buttons ─────────────────────────────────────────────────── */
      button {
        cursor: pointer;
        border: none;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 600;
        padding: 9px 18px;
        letter-spacing: 0.01em;
        transition:
          background 0.12s,
          color 0.12s,
          border-color 0.12s;
      }
      button.primary {
        background: var(--accent);
        color: var(--accent-fg);
        border: 1px solid transparent;
      }
      button.primary:hover {
        background: var(--accent-dark);
      }
      button.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      button.secondary:hover {
        background: var(--surface2);
      }
      button.danger {
        background: #fee2e2;
        color: #dc2626;
        border: 1px solid #fca5a5;
      }
      button.danger:hover {
        background: #fecaca;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Links ───────────────────────────────────────────────────── */
      a {
        color: var(--text);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* ── Strategy cards ─────────────────────────────────────────── */
      .strategy-card {
        padding: 12px 14px;
        margin-bottom: 8px;
        background: var(--surface);
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }

      /* ── Message cards ───────────────────────────────────────────── */
      .message {
        padding: 14px 18px;
        margin-bottom: 10px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }
      .message-user {
        background: var(--surface);
        border-left: 3px solid var(--accent);
      }
      .message-assistant {
        background: var(--surface2);
        border-left: 3px solid var(--border);
      }
      .message-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .message-role {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
      }
      .message-user .message-role {
        color: var(--text);
      }
      .message-tokens {
        font-size: 10px;
        font-family: var(--mono);
        color: var(--text-muted);
      }
      .message-body {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13.5px;
        line-height: 1.65;
        color: var(--text);
      }

      /* ── Budget bar ─────────────────────────────────────────────── */
      .budget-bar-header {
        display: flex;
        align-items: baseline;
        gap: 20px;
        margin-bottom: 12px;
      }
      .budget-bar-value {
        font-size: 42px;
        font-weight: 800;
        font-family: var(--mono);
        letter-spacing: -0.04em;
        line-height: 1;
      }
      .budget-bar-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 0.01em;
      }
      .budget-bar-meta {
        margin-left: auto;
        color: var(--text-muted);
        font-size: 11px;
        font-family: var(--mono);
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .budget-bar-separator {
        color: var(--border);
      }
      .budget-progress {
        display: block;
        width: 100%;
        height: 6px;
        border: none;
        border-radius: 3px;
        overflow: hidden;
        background: var(--border);
        appearance: none;
        -webkit-appearance: none;
      }
      .budget-progress::-webkit-progress-bar {
        background: var(--border);
        border-radius: 3px;
      }
      .budget-progress::-webkit-progress-value {
        border-radius: 3px;
        transition: width 0.4s ease;
      }
      .budget-progress::-moz-progress-bar {
        border-radius: 3px;
      }

      /* ── Badges ──────────────────────────────────────────────────── */
      .badge {
        display: inline-block;
        font-size: 9px;
        font-family: var(--mono);
        font-weight: 700;
        padding: 2px 6px;
        border-radius: var(--radius);
        margin-left: 4px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .badge-pinned {
        background: #eef2ff;
        color: #4338ca;
        border: 1px solid #c7d2fe;
      }
      .badge-summary {
        background: #f0f9ff;
        color: #0369a1;
        border: 1px solid #bae6fd;
      }
      .badge-cached {
        background: #f0fdf4;
        color: #15803d;
        border: 1px solid #bbf7d0;
      }

      /* ── Status colours ──────────────────────────────────────────── */
      .status-ok {
        color: var(--green);
      }
      .status-warn {
        color: var(--amber);
      }
      .status-act {
        color: var(--red);
      }
      .status-overflow {
        color: var(--red);
        font-weight: 700;
      }
      .budget-progress.status-ok::-webkit-progress-value {
        background: var(--green);
      }
      .budget-progress.status-warn::-webkit-progress-value {
        background: var(--amber);
      }
      .budget-progress.status-act::-webkit-progress-value {
        background: var(--red);
      }
      .budget-progress.status-ok::-moz-progress-bar {
        background: var(--green);
      }
      .budget-progress.status-warn::-moz-progress-bar {
        background: var(--amber);
      }
      .budget-progress.status-act::-moz-progress-bar {
        background: var(--red);
      }

      /* ── Error ───────────────────────────────────────────────────── */
      .error {
        color: var(--red);
        padding: 8px;
        font-size: 13px;
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <header>
      <h1><span></span>headroom</h1>
      <span class="model-badge"
        >{{ status.model if status.model is defined else '' }}</span
      >
      <span class="session-name"
        >{{ status.session_name if status.session_name is defined else ''
        }}</span
      >
    </header>
    {% block body %}{% endblock %}
    <style>
      /* ── Markdown rendering ─────────────────────────────────── */
      .message-body p          { margin: 0 0 0.6em; }
      .message-body p:last-child { margin-bottom: 0; }
      .message-body h1, .message-body h2, .message-body h3,
      .message-body h4, .message-body h5, .message-body h6 {
        font-weight: 700; margin: 0.8em 0 0.3em; line-height: 1.3;
      }
      .message-body h1 { font-size: 1.2em; }
      .message-body h2 { font-size: 1.1em; }
      .message-body h3 { font-size: 1em; }
      .message-body ul, .message-body ol {
        padding-left: 1.4em; margin: 0.4em 0 0.6em;
      }
      .message-body li { margin-bottom: 0.25em; }
      .message-body code {
        font-family: var(--mono);
        font-size: 0.85em;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 1px 5px;
      }
      .message-body pre {
        position: relative;
        background: #f6f8fa;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 14px;
        overflow-x: auto;
        margin: 0.6em 0;
      }
      .message-body pre code {
        background: none !important;
        border: none;
        padding: 0;
        font-size: 0.82em;
        font-family: var(--mono);
      }
      /* language label */
      .code-lang {
        position: absolute;
        top: 6px; left: 10px;
        font-size: 10px;
        font-family: var(--mono);
        color: var(--text-muted);
        text-transform: lowercase;
        letter-spacing: 0.04em;
        pointer-events: none;
      }
      .message-body pre:has(.code-lang) { padding-top: 26px; }
      /* copy button */
      .code-copy-btn {
        position: absolute;
        top: 6px; right: 8px;
        font-size: 10px;
        font-family: var(--mono);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 2px 8px;
        cursor: pointer;
        color: var(--text-muted);
        opacity: 0;
        transition: opacity 0.15s;
      }
      .message-body pre:hover .code-copy-btn { opacity: 1; }
      .code-copy-btn.copied {
        color: #16a34a;
        border-color: #86efac;
        background: #f0fdf4;
      }
      .message-body blockquote {
        border-left: 3px solid var(--border);
        padding-left: 12px;
        color: var(--text-muted);
        margin: 0.4em 0;
      }
      .message-body strong { font-weight: 700; }
      .message-body em     { font-style: italic; }
      .message-body hr {
        border: none; border-top: 1px solid var(--border); margin: 0.8em 0;
      }
      .message-body a { color: var(--text); text-decoration: underline; }
    </style>
    <script>
      marked.use({
        breaks: true,
        gfm: true,
        renderer: {
          code({ text, lang }) {
            const language = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
            const highlighted = hljs.highlight(text, { language }).value;
            const langLabel = lang ? `<span class="code-lang">${lang}</span>` : '';
            return `<pre>${langLabel}<button class="code-copy-btn" onclick="copyCode(this)">copy</button><code class="hljs language-${language}">${highlighted}</code></pre>`;
          }
        }
      });

      function renderMarkdown() {
        document.querySelectorAll('.message-body[data-raw]').forEach(el => {
          el.innerHTML = marked.parse(el.dataset.raw);
          el.removeAttribute('data-raw');
        });
      }

      function copyCode(btn) {
        const code = btn.closest('pre').querySelector('code').innerText;
        navigator.clipboard.writeText(code).then(() => {
          btn.textContent = 'copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'copy';
            btn.classList.remove('copied');
          }, 1800);
        });
      }

      document.addEventListener('DOMContentLoaded', renderMarkdown);
      document.addEventListener('htmx:afterSettle', renderMarkdown);
    </script>
  </body>
</html>
