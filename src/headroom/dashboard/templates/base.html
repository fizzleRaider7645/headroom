<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>headroom{% block title %}{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --border: #2e3248;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --radius: 8px;
      --mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--green);
    }
    header .model-badge {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      grid-template-rows: auto 1fr;
      height: calc(100vh - 53px);
    }
    .budget-section {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    .chat-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-family: var(--mono);
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      margin-left: 4px;
    }
    .badge-pinned { background: #312e81; color: #a5b4fc; }
    .badge-summary { background: #1e3a5f; color: #7dd3fc; }
    .badge-cached { background: #14532d; color: #86efac; }
    .error { color: var(--red); padding: 8px; }
    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button.primary { background: var(--blue); color: white; }
    button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    a { color: var(--blue); text-decoration: none; }
    .strategy-card {
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .status-ok       { color: var(--green); }
    .status-warn     { color: var(--amber); }
    .status-act      { color: var(--red); }
    .status-overflow { color: var(--red); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <h1>headroom</h1>
    <span class="model-badge">{{ status.model if status.model is defined else '' }}</span>
    <span class="model-badge" style="margin-left:auto">{{ status.session_name if status.session_name is defined else '' }}</span>
  </header>
  {% block body %}{% endblock %}
</body>
</html>
