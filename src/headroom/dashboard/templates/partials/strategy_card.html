<div class="strategy-card">
  <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
    <span style="font-family:var(--mono); font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
      {{ strategy['name'] }}
    </span>
    <button
      class="{{ 'primary' if strategy['enabled'] else 'secondary' }}"
      style="font-size:11px; padding:4px 10px; flex-shrink:0;"
      hx-post="/partials/strategy/{{ strategy['name'] }}/toggle"
      hx-target="closest .strategy-card"
      hx-swap="outerHTML"
    >
      {{ 'ON' if strategy['enabled'] else 'OFF' }}
    </button>
  </div>
  <div style="font-size:11px; color:var(--text-muted); margin-top:4px;">
    priority: {{ strategy['priority'] }}
  </div>
</div>
