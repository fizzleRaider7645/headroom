<div class="budget-bar-content">
  <div class="budget-bar-header">
    <span class="budget-bar-value {{ status_class }}">
      {{ "{:,}".format(headroom) }}
    </span>
    <span class="budget-bar-label"> tokens of headroom </span>
    <span class="budget-bar-meta">
      {{ "{:,}".format(used) }} / {{ "{:,}".format(limit) }} used &nbsp;<span
        class="budget-bar-separator"
        >|</span
      >&nbsp; {{ headroom_pct }}% free &nbsp;<span class="budget-bar-separator"
        >|</span
      >&nbsp; {{ turns }} turns &nbsp;<span class="budget-bar-separator">|</span
      >&nbsp; {{ cache_hits }} cache hits
    </span>
  </div>
  <progress
    class="budget-progress {{ status_class }}"
    value="{{ used_pct }}"
    max="100"
  ></progress>
</div>
