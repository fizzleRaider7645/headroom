<div class="budget-bar-content">
  <div style="display:flex; align-items:baseline; gap:16px; margin-bottom:10px;">
    <span style="font-size:28px; font-weight:800; font-family:var(--mono); color:{{ color }}">
      {{ "{:,}".format(headroom) }}
    </span>
    <span style="color:var(--text-muted); font-size:13px;">tokens of headroom</span>
    <span style="margin-left:auto; color:var(--text-muted); font-size:12px; font-family:var(--mono);">
      {{ "{:,}".format(used) }} / {{ "{:,}".format(limit) }} used &nbsp;|&nbsp;
      {{ headroom_pct }}% free &nbsp;|&nbsp;
      {{ turns }} turns &nbsp;|&nbsp;
      {{ cache_hits }} cache hits
    </span>
  </div>
  <div style="background:var(--surface2); border-radius:4px; height:8px; overflow:hidden;">
    <div style="
      background:{{ color }};
      width:{{ used_pct }}%;
      height:100%;
      border-radius:4px;
      transition:width 0.3s ease;
    "></div>
  </div>
</div>
